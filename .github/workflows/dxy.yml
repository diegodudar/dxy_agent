name: DXY collector

on:
  schedule:
    - cron: "39 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Wait until 08:40:00 precisely
        run: |
          python - <<EOF
          import datetime, time

          while True:
              now = datetime.datetime.utcnow() - datetime.timedelta(hours=3)
              if now.minute == 40 and now.second == 0:
                  print("Aligned to 08:40:00")
                  break
              time.sleep(0.2)
          EOF

      - name: Run collector
        run: python coletor_dxy.py

      - name: Commit CSV update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "update DXY dataset" || echo "no changes"
          git push
