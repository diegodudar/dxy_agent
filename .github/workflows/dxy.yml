name: Macro collector 08:40

on:
  schedule:
    - cron: "40 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run macro collector
        run: python coletor_macro.py

      - name: Commit dataset update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add dados/*.csv || true
          git commit -m "update macro dataset 08:40" || true
          git push
